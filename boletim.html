<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>boletim</title>
    <style>
        thead {
            border: solid;
            border-collapse: collapse;
        }
        table {
            border: solid black;
            border-collapse: collapse;
            padding: 10px;
        }

        th,
        tr,
        td {
            border: solid black;
            padding: 10px;
        }
    </style>
</head>

<body>
    <thead>
            <tr>
                <td>Disciplinas</td>
                <td>Conceitos</td>
                <td>Presença</td>
            </tr>
    </thead>
    <table>
        <tbody>
            <tr>
                <td>Iglês</td>
                <td>A</td>
                <td>80%</td>
            </tr>
            <tr>
                <td>Desenvolvimento Web</td>
                <td>A</td>
                <td>99%</td>
            </tr>
            <tr>
                <td colspan="2">Total de Presença</td>
                <td>99%</td>
            </tr>
            
        </tbody>
    </table>
</body>

</html>
