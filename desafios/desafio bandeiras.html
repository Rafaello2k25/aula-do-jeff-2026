<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bandeira da alemanha</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            padding: 50px;
        }
        /* Italia */

        .italia {
            border: solid 1px;
            margin-bottom: 50px;
            width: 200px;
            height: 90px;
            display: flex;
        }

        .italia div {
            width: 33.33%;
            height: 100%;
            
        }

        .italia .verde {
            background-color: green;
        }
        .italia .branco {
            background-color: whitesmoke;
        }
        .italia .vermelho {
            background-color: red;
        }

        /* Holanda */

        .Holanda {
            border: solid 1px;
            margin-bottom: 50px;
            width: 700px;
            height: 350px;
        }

        .Holanda div {
            width : 100%;
            height: 33.33%;
        }

        .Holanda .vermelho {
            background-color: red;
        }

        .branco {
            background-color: whitesmoke;
        }

        .azul {
            background-color: blue;
        }

        /* Alemanha */

        .alemanha {
            margin-bottom: 50px;
        }

        .alemanha div {
            width: 700px;
            padding: 65px;
        }

        .preto {
            background-color: black;
        }

        .alemanha .vermelho {
            background-color: red;
        }

        .amarelo {
            background-color: yellow;
        }
    </style>
</head>

<body>

    <div class="alemanha">
        <div class="preto"> </div>
        <div class="vermelho"> </div>
        <div class="amarelo"> </div>
    </div>
    <div class="Holanda">
        <div class="vermelho"></div>
        <div class="branco"></div>
        <div class="azul"></div>
    </div>
    <div class="italia">
        <div class="verde"></div>
        <div class="branco"></div>
        <div class="vermelho"></div>
    </div>
</body>

</html>
